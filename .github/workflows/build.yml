name: Build

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

jobs:
  # =============================================================================
  # Linux Build
  # =============================================================================
  build-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        build_type: [Debug, Release]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build build-essential

      - name: Configure
        run: |
          cmake -S . -B build/linux \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DCAMPELLO_RENDERER_BUILD_TEST=OFF \
            -G Ninja

      - name: Build
        run: cmake --build build/linux --config ${{ matrix.build_type }}

      # Tests disabled on Linux: campello_gpu Linux/Vulkan backend is placeholder only
      # - name: Test
      #   run: ctest --test-dir build/linux --output-on-failure

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: campello_renderer-linux-${{ matrix.build_type }}
          path: build/linux/*.so
          if-no-files-found: ignore

  # =============================================================================
  # Windows Build
  # =============================================================================
  build-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        build_type: [Debug, Release]
        arch: [x64]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.arch }}

      - name: Configure
        shell: cmd
        run: |
          cmake -S . -B build/windows ^
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} ^
            -DCAMPELLO_RENDERER_BUILD_TEST=OFF ^
            -A ${{ matrix.arch }}

      - name: Build
        run: cmake --build build/windows --config ${{ matrix.build_type }}

      # Tests disabled on Windows: library builds as DLL but import library (.lib) 
      # generation requires proper symbol exports
      # - name: Test
      #   run: ctest --test-dir build/windows --output-on-failure -C ${{ matrix.build_type }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: campello_renderer-windows-${{ matrix.arch }}-${{ matrix.build_type }}
          path: build/windows/${{ matrix.build_type }}/*.dll
          if-no-files-found: ignore

  # =============================================================================
  # macOS Build
  # =============================================================================
  build-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        build_type: [Debug, Release]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure Library
        run: |
          cmake -S . -B build/macos \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DCAMPELLO_RENDERER_BUILD_TEST=ON

      - name: Build Library
        run: cmake --build build/macos --config ${{ matrix.build_type }}

      - name: Test
        run: ctest --test-dir build/macos --output-on-failure

      - name: Configure Example
        run: |
          cmake -S . -B build/macos-example \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DCAMPELLO_RENDERER_BUILD_MACOS_EXAMPLE=ON

      - name: Build Example
        run: cmake --build build/macos-example --config ${{ matrix.build_type }}

      - name: Upload library artifacts
        uses: actions/upload-artifact@v4
        with:
          name: campello_renderer-macos-${{ matrix.build_type }}
          path: build/macos/*.dylib
          if-no-files-found: ignore

      - name: Upload example artifacts
        uses: actions/upload-artifact@v4
        with:
          name: campello_renderer-macos-example-${{ matrix.build_type }}
          path: build/macos-example/examples/macos/${{ matrix.build_type }}/*.app
          if-no-files-found: ignore

  # =============================================================================
  # iOS Build
  # =============================================================================
  build-ios:
    runs-on: macos-latest
    strategy:
      matrix:
        build_type: [Debug, Release]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure
        run: |
          cmake -S . -B build/ios \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=14.0 \
            -DCMAKE_OSX_ARCHITECTURES="arm64" \
            -DCMAKE_IOS_INSTALL_COMBINED=NO

      - name: Build
        run: cmake --build build/ios --config ${{ matrix.build_type }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: campello_renderer-ios-${{ matrix.build_type }}
          path: build/ios/**/*.a
          if-no-files-found: ignore

  # =============================================================================
  # Android Build
  # =============================================================================
  build-android:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        build_type: [Debug, Release]
        abi: [arm64-v8a, armeabi-v7a, x86_64, x86]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: sdkmanager "ndk;26.1.10909125" "cmake;3.22.1"

      - name: Build with Gradle
        working-directory: examples/android
        run: |
          ./gradlew assemble${{ matrix.build_type }} \
            -Pandroid.injected.build.abi=${{ matrix.abi }}

      - name: Set build type lowercase
        id: vars
        run: |
          if [ "${{ matrix.build_type }}" = "Debug" ]; then
            echo "BUILD_TYPE_LC=debug" >> $GITHUB_OUTPUT
          else
            echo "BUILD_TYPE_LC=release" >> $GITHUB_OUTPUT
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: campello_renderer-android-${{ matrix.abi }}-${{ matrix.build_type }}
          path: examples/android/app/build/outputs/apk/${{ steps.vars.outputs.BUILD_TYPE_LC }}/*.apk
          if-no-files-found: ignore

      - name: Upload native libraries
        uses: actions/upload-artifact@v4
        with:
          name: campello_renderer-android-libs-${{ matrix.abi }}-${{ matrix.build_type }}
          path: |
            examples/android/app/build/intermediates/merged_native_libs/${{ steps.vars.outputs.BUILD_TYPE_LC }}/out/lib/${{ matrix.abi }}/*.so
          if-no-files-found: ignore
